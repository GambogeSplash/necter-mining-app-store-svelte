<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .hex-outer { fill: #0C0C0E; stroke: #0C0C0E; }
      .hex-inner { stroke: rgba(0,0,0,0.25); }
      .hex-cell { stroke: rgba(0,0,0,0.12); }
      .hex-dot { fill: #0C0C0E; }
      .letter { fill: white; }
    }
    @media (prefers-color-scheme: dark) {
      .hex-outer { fill: #0C0C0E; stroke: rgba(255,191,0,0.25); }
      .hex-inner { stroke: rgba(255,191,0,0.15); }
      .hex-cell { stroke: rgba(255,191,0,0.08); }
      .hex-dot { fill: #FFBF00; }
      .letter { fill: #EDEDEF; }
    }
  </style>
  <!-- Outer hexagon shape -->
  <polygon class="hex-outer" points="90,6 168,42 168,138 90,174 12,138 12,42" stroke-width="2"/>
  <!-- Inner honeycomb cells (decorative) -->
  <polygon class="hex-inner" points="90,30 135,52 135,98 90,120 45,98 45,52" fill="none" stroke-width="1"/>
  <polygon class="hex-cell" points="90,55 112,68 112,93 90,106 68,93 68,68" fill="none" stroke-width="0.8"/>
  <polygon class="hex-cell" points="90,75 100,81 100,93 90,99 80,93 80,81" fill="none" stroke-width="0.6"/>
  <!-- N lettermark -->
  <g style="transform: scale(0.7); transform-origin: center;">
    <path class="letter"
      d="M101.141 53H136.632C151.023 53 162.689 64.6662 162.689 79.0573V112.904H148.112V79.0573C148.112 78.7105 148.098 78.3662 148.072 78.0251L112.581 112.898C112.701 112.902 112.821 112.904 112.941 112.904H148.112V126.672H112.941C98.5504 126.672 86.5638 114.891 86.5638 100.5V66.7434H101.141V100.5C101.141 101.15 101.191 101.792 101.289 102.422L137.56 66.7816C137.255 66.7563 136.945 66.7434 136.632 66.7434H101.141V53Z" />
    <path class="letter"
      d="M65.2926 124.136L14 66.7372H34.6355L64.7495 100.436V66.7372H80.1365V118.47C80.1365 126.278 70.4953 129.958 65.2926 124.136Z" />
  </g>
  <!-- Center accent dot -->
  <circle class="hex-dot" cx="90" cy="148" r="4"/>
</svg>
